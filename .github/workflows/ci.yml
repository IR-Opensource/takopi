name: CI

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - task: format
            do_sync: true
            command: uv run --no-sync ruff format --check --diff src tests
            sync_args: --no-install-project
          - task: ruff
            do_sync: true
            command: uv run --no-sync ruff check src tests --output-format=github
            sync_args: --no-install-project
          - task: ty
            do_sync: true
            command: uv run --no-sync ty check src tests
            sync_args: --no-install-project
          - task: pytest
            do_sync: true
            command: uv run --no-sync pytest
            sync_args: ""
          - task: build
            do_sync: false
            command: uv build
            sync_args: ""
          - task: docs
            do_sync: true
            command: uv run --no-sync python scripts/docs_prebuild.py && uv run --no-sync zensical build --clean
            sync_args: --no-install-project --group docs

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: 'https://app.stage.invisirisk.com'
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============

      # 🔥 FIX: restore broken TLS trust caused by PSE
      - name: Fix TLS trust broken by PSE
        run: |
          sudo apt-get update
          sudo apt-get install -y --reinstall ca-certificates
          sudo update-ca-certificates

          unset SSL_CERT_FILE
          unset REQUESTS_CA_BUNDLE
          unset CURL_CA_BUNDLE

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        if: matrix.do_sync
        run: uv sync --frozen ${{ matrix.sync_args }}

      - name: Run check
        run: ${{ matrix.command }}

      - name: Add coverage to summary
        if: ${{ always() && matrix.task == 'pytest' }}
        run: |
          {
            echo "## Coverage"
            echo ""
            uv run --no-sync python -m coverage report || true
          } >> "$GITHUB_STEP_SUMMARY"

      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============

  notify-commit:
    name: notify-commit
    runs-on: ubuntu-latest
    needs: checks
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.checks.result == 'success' }}
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: 'https://app.stage.invisirisk.com'
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============

      # 🔥 FIX: restore TLS trust again in second job
      - name: Fix TLS trust broken by PSE
        run: |
          sudo apt-get update
          sudo apt-get install -y --reinstall ca-certificates
          sudo update-ca-certificates

          unset SSL_CERT_FILE
          unset REQUESTS_CA_BUNDLE
          unset CURL_CA_BUNDLE

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Send Telegram notification
        run: uv run scripts/commit_notify.py
        env:
          REPO: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
